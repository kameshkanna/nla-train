# NLA training config: Qwen2.5-7B-Instruct, layer 20 pilot.
# All hyperparameters live here — scripts read this file, nothing is hardcoded.

target_model: "Qwen/Qwen2.5-7B-Instruct"
verbalizer_model: "Qwen/Qwen2.5-7B-Instruct"
target_layer: 20
d_model: 3584
num_layers: 28  # total decoder layers in target model
seed: 42

# Reference checkpoint for validation (kitft layer-20 release)
reference_av_checkpoint: "kitft/nla-qwen2.5-7b-L20-av"
reference_ar_checkpoint: "kitft/nla-qwen2.5-7b-L20-ar"

datagen:
  corpus: "HuggingFaceFW/fineweb"
  corpus_name: "sample-10BT"        # fineweb subset
  n_docs: 100000
  positions_per_doc: 10             # activation samples per document
  min_token_position: 50            # skip first 50 tokens (insufficient left context)
  max_seq_len: 2048                 # matches kitft stage0 max_length=2048
  chunk_size: 1024                  # documents per parquet chunk (resume granularity)
  batch_size: 16                    # SGLang takes ~38GB, stage0 model ~15GB, 16 docs × 2048 fits in remaining ~26GB
  av_sft_frac: 0.25                 # 25k docs → AV SFT (matches kitft 25/25/50 split)
  ar_sft_frac: 0.25                 # 25k docs → AR SFT
  rl_frac: 0.50                     # 50k docs → RL
  output_dir: "data/raw"

injection:
  cjk_range_start: 0x3200           # U+3200 Enclosed CJK Letters begin
  cjk_range_end: 0x33FF             # U+33FF Enclosed CJK Letters end
  cache_file: "data/injection_token_cache.yaml"

labeling:
  sglang_url: "http://localhost:30000"  # unused now (direct HF inference)
  hf_batch_size: 128                # sequences per GPU forward pass — Qwen GQA KV cache ~3GB at B=128
  max_new_tokens: 300               # matches kitft stage2 claude-haiku max_tokens=300
  temperature: 0.7
  output_dir: "data/labeled"

ar_sft:
  output_dir: "checkpoints/ar_sft"
  lora_rank: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  per_device_train_batch_size: 64   # 16GB headroom on H100; 64×256 fits
  gradient_accumulation_steps: 4    # effective batch = 256
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  lr_min_ratio: 0.1                 # final lr = lr * ratio = 2e-6
  warmup_steps: 50
  num_train_epochs: 1
  bf16: true
  gradient_checkpointing: false     # truncated model fits without it
  dataloader_num_workers: 8
  save_steps: 200
  logging_steps: 10

av_sft:
  output_dir: "checkpoints/av_sft"
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  per_device_train_batch_size: 16   # full 28-layer model + grad checkpointing recompute peaks
  gradient_accumulation_steps: 16   # effective batch = 256
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  lr_min_ratio: 0.1
  warmup_steps: 50
  num_train_epochs: 1
  bf16: true
  gradient_checkpointing: true      # full 28-layer model needs it
  dataloader_num_workers: 8
  save_steps: 200
  logging_steps: 10
  max_length: 256                   # prompt ~50 tokens + response ~150 = 200 max; 256 is safe ceiling
  max_response_length: 150          # cap AV output tokens (matches RL stage)

grpo:
  output_dir: "checkpoints/grpo"
  num_generations: 8                # samples per prompt (vLLM handles these cheaply)
  max_completion_length: 150
  kl_coef: 0.01
  learning_rate: 1.41e-5
  per_device_train_batch_size: 4    # smaller training batch leaves GPU headroom for vLLM
  gradient_accumulation_steps: 32   # effective batch = 128 prompts
  num_train_epochs: 1
  bf16: true
  gradient_checkpointing: true
  save_steps: 100
  logging_steps: 5
  ar_update_every_n_steps: 10       # re-train AR every N GRPO steps

validation:
  output_dir: "results/validation"
  n_samples: 100
  our_av_port: 30001
  kitft_av_port: 30000
